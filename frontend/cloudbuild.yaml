# Build frontend with VITE_API_BASE_URL, then deploy to Cloud Run.
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_API_BASE_URL=https://dayadapt-api-xxxxx-uc.a.run.app/api/v1
#
# Or set default: gcloud config set builds/substitutions/_API_BASE_URL
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/dayadapt-fe:${SHORT_SHA}'
      - '--build-arg'
      - 'VITE_API_BASE_URL=${_API_BASE_URL}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/dayadapt-fe:${SHORT_SHA}'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dayadapt-fe'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/dayadapt-fe:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'

substitutions:
  _API_BASE_URL: 'https://localhost:3000/api/v1'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
